services:
  postgres:
    image: postgres:15
    container_name: korp_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: korp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pg_config/pg_hba.conf:/var/lib/postgresql/data/pg_hba.conf
    command: postgres -c hba_file=/var/lib/postgresql/data/pg_hba.conf

volumes:
  pgdata: